services:
  gateway:
    build: ./gateway
    image: valence-gateway:${VALENCE_VERSION:-latest}
    env_file: .env
    environment:
      GATEWAY_PORT: "8080"
      GATEWAY_API_KEY_SCOPES: ${GATEWAY_API_KEY_SCOPES:-valence:proxy,review:admin,shadow:admin,policy:admin,operations:admin}
      GUARD_USER_POLICY: ${GUARD_USER_POLICY:-direct}
      GUARD_MODEL_PATH: ${GUARD_MODEL_PATH:-models/prompt-injection-guard.json}
      GUARD_MODEL_SHA256: ${GUARD_MODEL_SHA256:-c9e6888213773172ff6127d1165146f02cb03d079d8011b6e20429e0d9bcec02}
      GUARD_MODEL_ENFORCEMENT: ${GUARD_MODEL_ENFORCEMENT:-advisory}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INGEST_TOPIC: valence-raw-profiles
      REDIS_URL: redis://redis:6379
      REVIEW_OPERATIONS_URL: http://operations.internal:8091
      REVIEW_OPERATIONS_INTERNAL_KEY: ${VALENCE_REVIEW_INTERNAL_KEY:-replace-with-an-internal-32-plus-character-secret}
    depends_on:
      - redis
      - operations
    ports:
      - "8080:8080"
    networks:
      - valence-net
    restart: unless-stopped

  pipeline:
    build: ./pipeline
    image: valence-pipeline:${VALENCE_VERSION:-latest}
    env_file: .env
    environment:
      PROXY_HOST: gateway
      PROXY_PORT: "8080"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INGEST_TOPIC: valence-raw-profiles
      VALENCE_REVIEW_DB_PATH: /data/reviews.sqlite
      VALENCE_SHADOW_DB_PATH: /data/shadow.sqlite
    depends_on:
      - gateway
    ports:
      - "8090:8090"
    networks:
      - valence-net
    volumes:
      - operations-data:/data
    restart: unless-stopped

  operations:
    build: ./pipeline
    image: valence-pipeline:${VALENCE_VERSION:-latest}
    env_file: .env
    command: ["uvicorn", "operations_service:app", "--host", "0.0.0.0", "--port", "8091"]
    environment:
      VALENCE_REVIEW_INTERNAL_KEY: ${VALENCE_REVIEW_INTERNAL_KEY:-replace-with-an-internal-32-plus-character-secret}
      VALENCE_OPERATIONS_DB_DIR: /data
    expose:
      - "8091"
    networks:
      valence-net:
        aliases:
          - operations.internal
    volumes:
      - operations-data:/data
    restart: unless-stopped

  pipeline-worker:
    build: ./pipeline
    image: valence-pipeline:${VALENCE_VERSION:-latest}
    env_file: .env
    command: ["python", "stream_worker.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_INGEST_TOPIC: valence-raw-profiles
      KAFKA_DLQ_TOPIC: valence-profile-dlq
      REDIS_URL: redis://redis:6379
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - valence-net
    restart: unless-stopped
    profiles:
      - enterprise

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    networks:
      - valence-net
    profiles:
      - enterprise

  kafka-init:
    image: apache/kafka:3.9.1
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do sleep 2; done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic valence-raw-profiles --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic valence-profile-dlq --partitions 3 --replication-factor 1
    networks:
      - valence-net
    profiles:
      - enterprise

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - valence-net

networks:
  valence-net:
    driver: bridge

volumes:
  operations-data:
