services:
  gateway:
    build: ./gateway
    image: valence-gateway:${VALENCE_VERSION:-latest}
    env_file: .env
    environment:
      GATEWAY_PORT: "8080"
    ports:
      - "8080:8080"
    networks:
      - valence-net
    restart: unless-stopped

  pipeline:
    build: ./pipeline
    image: valence-pipeline:${VALENCE_VERSION:-latest}
    env_file: .env
    environment:
      PROXY_HOST: gateway
      PROXY_PORT: "8080"
    depends_on:
      - gateway
    ports:
      - "8090:8090"
    networks:
      - valence-net
    restart: unless-stopped

networks:
  valence-net:
    driver: bridge
