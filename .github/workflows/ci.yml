name: Valence Platform CI Compliance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gateway-security-check:
    name: TypeScript Gateway Linearity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Validate Dependencies & Audit
        run: |
          cd gateway
          npm ci
          npm audit --omit=dev --audit-level=high

      - name: Typecheck, Compile, and Test
        run: |
          cd gateway
          npm run typecheck
          npm run build
          npm test
          npm run benchmark:injection -- benchmarks/fixtures/injection-smoke.yaml
          npm run benchmark:injection -- benchmarks/fixtures/wambosec-test.jsonl models/prompt-injection-guard.json 0.95 0.95
          npm run benchmark:injection -- benchmarks/fixtures/deepset-test.jsonl models/prompt-injection-guard.json 0.84 0.78
          npm run benchmark:pii -- benchmarks/fixtures/pii-smoke.jsonl

  pipeline-integrity-check:
    name: Python Analytical Pipeline Matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Runtime and Test Dependencies
        run: |
          cd pipeline
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Enforce Strict Code Integrity Test Suite
        run: |
          cd pipeline
          python -W error -m pytest -q

      - name: Validate Repository Links
        run: python scripts/check_links.py README.md BENCHMARKS.md DATASETS.md RELEASE.md THIRD_PARTY_NOTICES.md

  orchestration-container-check:
    name: Isolated Multi-Stage Mesh Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Environment File
        run: cp .env.example .env

      - name: Validate Compose Topology
        run: docker compose config

      - name: Execute Multi-Stage Production Build
        run: docker compose build

      - name: Start Production Topology
        run: docker compose up -d

      - name: Execute Live Docker Smoke
        run: python scripts/docker_live_smoke.py --timeout-seconds 120

      - name: Capture Container Logs on Failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Production Topology
        if: always()
        run: docker compose down --volumes --remove-orphans

  benchmark-reproducibility-check:
    name: Benchmark Reproducibility Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Checked-In Benchmark Provenance
        run: python pipeline/benchmarks/build_reproducibility_manifest.py --check
